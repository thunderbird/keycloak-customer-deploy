apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keycloak-customer
# tb-prod is currently a TAILNET-ONLY validation deployment against the isolated
# mzla-tb-prod Neon branch (mirrors tb-dev). The public-cutover resources
# (keycloak/cloudflare-tunnel.yaml, keycloak/cloudflare-externalsecret.yaml,
# keycloak/tailscale-admin-ingress.yaml) and the 3-replica / minAvailable-2 PDB
# patch (keycloak/pdb.yaml) are kept in this directory but intentionally NOT
# referenced yet -- they are wired in at the prod cutover (#142).
resources:
- ../../bases
- keycloak/tailscale-ingress.yaml
- keycloak/securitygrouppolicy.yaml
images:
- name: REPLACE_MZLA_ECR/keycloak-customer
  newName: ghcr.io/thunderbird/thunderbird-accounts-keycloak
  digest: sha256:253c3c0d1585eef9764726dd116bd1a78e252bc199f0f405a808d9088f85bb26
patches:
# Keycloak workload: tailnet hostname + Neon branch DB host, 2 replicas
- path: keycloak/statefulset.yaml
# ExternalSecret remoteRef keys -> mzla/tb-prod/*
- target:
    group: external-secrets.io
    version: v1
    kind: ExternalSecret
    name: keycloak-customer-db
  patch: |-
    - op: replace
      path: /spec/data/0/remoteRef/key
      value: mzla/tb-prod/keycloak-customer-db
    - op: replace
      path: /spec/data/1/remoteRef/key
      value: mzla/tb-prod/keycloak-customer-db
- target:
    group: external-secrets.io
    version: v1
    kind: ExternalSecret
    name: keycloak-customer-admin
  patch: |-
    - op: replace
      path: /spec/data/0/remoteRef/key
      value: mzla/tb-prod/keycloak-customer-admin
    - op: replace
      path: /spec/data/1/remoteRef/key
      value: mzla/tb-prod/keycloak-customer-admin
