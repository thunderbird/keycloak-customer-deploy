---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak-customer

# tb-prod is the prod-cutover scaffolding for the public Customer Auth host: a public
# internet-facing ALB Ingress (keycloak/public-ingress.yaml) whose TLS cert the AWS LB
# Controller auto-creates + DNS-validates in ACM (EnableCertificateManagement); Keycloak
# keeps KC_PROXY_HEADERS=xforwarded so it trusts the ALB X-Forwarded-* headers. The public
# auth host is served by the ALB Ingress; the admin console is tailnet-only
# (keycloak/tailscale-admin-ingress.yaml); minAvailable-2 PDB (keycloak/pdb.yaml).
#
# The Cloudflare tunnel resources (keycloak/cloudflare-tunnel.yaml,
# keycloak/cloudflare-externalsecret.yaml) are the superseded edge-TLS path and
# stay staged-unreferenced. Actual prod traffic cutover is human-gated (#142).

resources:
  - ../../bases
  # tailnet LOGIN ingress dropped: KC_HOSTNAME is now the public ALB host
  # (auth.tb-prod.thunderbird.dev) with KC_HOSTNAME_STRICT=true, so the old
  # keycloak-customer-tb-prod tailnet host can't serve login. Admin stays tailnet:
  - keycloak/tailscale-admin-ingress.yaml
  - keycloak/public-ingress.yaml
  - keycloak/securitygrouppolicy.yaml

images:
  - name: REPLACE_MZLA_ECR/keycloak-customer
    newName: 689951664252.dkr.ecr.eu-central-1.amazonaws.com/keycloak-customer
    # Mirrored multi-arch image; re-align this tag to the accounts-prod release
    # at the prod cutover (#142).
    newTag: keycloak-e7ef91efd43f7619e7fc522fb64737b56efb9ffc

patches:
  # Keycloak workload: public auth hostname + tailnet admin hostname, Neon DB host
  - path: keycloak/statefulset.yaml
  # HA PDB: keep 2 of 3 pods available during voluntary disruptions
  - path: keycloak/pdb.yaml
  # ExternalSecret remoteRef keys -> mzla/tb-prod/*
  - target:
      group: external-secrets.io
      version: v1
      kind: ExternalSecret
      name: keycloak-customer-db
    patch: |-
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: mzla/tb-prod/keycloak-customer-db
      - op: replace
        path: /spec/data/1/remoteRef/key
        value: mzla/tb-prod/keycloak-customer-db
  - target:
      group: external-secrets.io
      version: v1
      kind: ExternalSecret
      name: keycloak-customer-admin
    patch: |-
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: mzla/tb-prod/keycloak-customer-admin
      - op: replace
        path: /spec/data/1/remoteRef/key
        value: mzla/tb-prod/keycloak-customer-admin
