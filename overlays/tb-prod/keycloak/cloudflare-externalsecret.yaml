# Cloudflare API token + account ID for the cloudflare-operator, required in the
# Tunnel's namespace. Source secret lives in shared-services, so this uses the
# cross-account ClusterSecretStore (us-east-1). See docs/cloudflare-tunnels.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-secrets
  namespace: keycloak-customer
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-shared
    kind: ClusterSecretStore
  target:
    name: cloudflare-secrets
    creationPolicy: Owner
  data:
    - secretKey: CLOUDFLARE_API_TOKEN
      remoteRef:
        key: mzla/shared-services/cloudflare-operator
        property: apiToken
    - secretKey: CLOUDFLARE_ACCOUNT_ID
      remoteRef:
        key: mzla/shared-services/cloudflare-operator
        property: accountID
