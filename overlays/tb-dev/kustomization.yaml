---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak-customer

resources:
  - ../../bases
  - keycloak/tailscale-ingress.yaml
  - keycloak/securitygrouppolicy.yaml

# Patched tbpro login.ftl (?no_esc on the window._page URL fields) mounted over
# the baked theme via subPath in the StatefulSet patch. Stable name (no hash
# suffix) so the volume reference in the patch resolves. Drop once the
# thunderbird-accounts image carries the fix.
configMapGenerator:
  - name: keycloak-tbpro-login-override
    files:
      - login.ftl=keycloak/tbpro-login.ftl
generatorOptions:
  disableNameSuffixHash: true

images:
  - name: REPLACE_MZLA_ECR/keycloak-customer
    newName: 718959508124.dkr.ecr.eu-central-1.amazonaws.com/keycloak-customer
    newTag: keycloak-e7ef91efd43f7619e7fc522fb64737b56efb9ffc

patches:
  # Keycloak workload: tailnet hostname + Neon branch DB host (dev is tailnet-only)
  - path: keycloak/statefulset.yaml
  # ExternalSecret remoteRef keys -> mzla/tb-dev/*
  - target:
      group: external-secrets.io
      version: v1
      kind: ExternalSecret
      name: keycloak-customer-db
    patch: |-
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: mzla/tb-dev/keycloak-customer-db
      - op: replace
        path: /spec/data/1/remoteRef/key
        value: mzla/tb-dev/keycloak-customer-db
  - target:
      group: external-secrets.io
      version: v1
      kind: ExternalSecret
      name: keycloak-customer-admin
    patch: |-
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: mzla/tb-dev/keycloak-customer-admin
      - op: replace
        path: /spec/data/1/remoteRef/key
        value: mzla/tb-dev/keycloak-customer-admin
