apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keycloak-customer
resources:
- ../../bases
# Public internet-facing ALB Ingress for the auth host (auth.tb-dev.thunderbird.dev),
# thunderbird.dev TEST domain; admin (/admin, /realms/master) denied 403 at the edge.
- keycloak/public-ingress.yaml
# Tailnet Ingress: now the ADMIN path (KC_HOSTNAME_ADMIN points here); still serves
# the whole service over the tailnet for admin/ops.
- keycloak/tailscale-ingress.yaml
- keycloak/securitygrouppolicy.yaml
# tb-accounts-admin service-account client secret (keycloak-config-cli auth)
- keycloak/admin-client-externalsecret.yaml
# Codified tbpro thunderbird-accounts client config, mounted into the keycloak pod
# (see keycloak/statefulset.yaml volumes) and reconciled at startup by
# apply-client-config.sh. Hash-suffixed so an edit rolls the pods.
configMapGenerator:
- name: keycloak-realm-config
  files:
  - keycloak/realm-config/tbpro-accounts-client.yaml
- name: keycloak-realm-config-scripts
  files:
  - keycloak/realm-config/apply-client-config.sh
  # Overrides the image's baked /scripts/apply-mfa-config.sh (subPath mount in the
  # statefulset) to add a retry loop around config-cli for transient rolling-restart
  # Infinispan cluster timeouts. Copy of the baked script + retry only.
  - keycloak/realm-config/apply-mfa-config.sh
images:
- name: REPLACE_MZLA_ECR/keycloak-customer
  newName: ghcr.io/thunderbird/thunderbird-accounts-keycloak
  digest: sha256:5c8962c37746b480f565a0eb0d11430ba12efe215172004d254a55e51528b6fc
patches:
# Keycloak workload: tailnet hostname + Neon branch DB host (dev is tailnet-only)
- path: keycloak/statefulset.yaml
# ExternalSecret remoteRef keys -> mzla/tb-dev/*
- target:
    group: external-secrets.io
    version: v1
    kind: ExternalSecret
    name: keycloak-customer-db
  patch: |-
    - op: replace
      path: /spec/data/0/remoteRef/key
      value: mzla/tb-dev/keycloak-customer-db
    - op: replace
      path: /spec/data/1/remoteRef/key
      value: mzla/tb-dev/keycloak-customer-db
- target:
    group: external-secrets.io
    version: v1
    kind: ExternalSecret
    name: keycloak-customer-admin
  patch: |-
    - op: replace
      path: /spec/data/0/remoteRef/key
      value: mzla/tb-dev/keycloak-customer-admin
    - op: replace
      path: /spec/data/1/remoteRef/key
      value: mzla/tb-dev/keycloak-customer-admin
