# tb-dev patch: single-AZ dev DB, no deletion protection, dev SG.
# SG id from mzla-tb-dev pulumi stack output rds_sg_keycloak_id.
apiVersion: rds.services.k8s.aws/v1alpha1
kind: DBInstance
metadata:
  name: keycloak-customer-db
  namespace: keycloak-customer
spec:
  dbInstanceIdentifier: mzla-keycloak-customer-dev
  multiAZ: false
  deletionProtection: false
  backupRetentionPeriod: 7
  vpcSecurityGroupIDs:
    - "sg-0550595389f41cfca"
