# Syncs the tb-accounts-admin service-account client secret from Secrets Manager.
# keycloak-config-cli (apply-mfa-config.sh + apply-client-config.sh) authenticates
# with this via client_credentials against the master realm. The value is the
# cloned stage secret (stored in mzla/tb-dev/keycloak-customer-admin-client), so it
# keeps matching after a Neon branch reset.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-customer-admin-client
  namespace: keycloak-customer
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: keycloak-customer-admin-client
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: mzla/tb-dev/keycloak-customer-admin-client
        property: client-secret
