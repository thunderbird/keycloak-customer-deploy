# tb-dev patch:
# - tailnet hostname (dev is tailnet-only; reached via the Tailscale Ingress)
# - 2 replicas, 500m cpu request so both pods fit the 2-node general pool
# - DB repointed from the throwaway dev RDS to the Neon branch "mzla-tb-dev"
#   (copy-on-write clone of stage tbpro). DIRECT endpoint (not -pooler) so
#   Liquibase/jdbc-ping aren't on PgBouncer; sslmode=require (Neon needs TLS).
#   valueFrom: null drops the base ConfigMap ref, so the ACK RDS/FieldExport
#   chain is moot (the RDS is left idle for now). Creds come from the
#   keycloak-customer-db ExternalSecret (now holding the branch keycloak_owner creds).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-customer
  namespace: keycloak-customer
spec:
  # Clustered (base replicas: 2, Infinispan DNS_PING).
  template:
    spec:
      containers:
        - name: keycloak
          # THE actual dev login fix: --proxy-headers xforwarded.
          #
          # The image entrypoint (scripts/entry-keycloak.sh) hardcodes
          # `kc.sh start ... --proxy-headers forwarded`, a CLI flag that overrides
          # the base KC_PROXY_HEADERS=xforwarded env and makes Keycloak read the
          # RFC 7239 `Forwarded` header. The Tailscale ingress sends only
          # X-Forwarded-* headers, so Keycloak never sees the forwarded https
          # scheme -> non-secure context -> the AUTH_SESSION_ID cookie is set
          # SameSite=None without Secure -> the browser refuses to store it ->
          # the login POST has no auth-session cookie -> 400 "Cookie not found"
          # (surfaced as cookie_not_found / invalid_code). Running with
          # `xforwarded` makes Keycloak read X-Forwarded-Proto=https -> secure
          # context -> Secure cookie -> stored & sent -> login completes.
          #
          # (The `&amp;` HTML-escaping of loginAction in the tbpro theme was a red
          # herring: Keycloak recovers `execution` from the cookie, so it is
          # harmless -- stage renders the identical `&amp;` and logs in fine. The
          # earlier theme-?no_esc initContainer was therefore removed.)
          #
          # Durable fix: make entry-keycloak.sh honor KC_PROXY_HEADERS (default
          # `forwarded`) so this command override can be dropped once the image
          # ships -- tracked in thunderbird/thunderbird-accounts#1037.
          command:
            - /bin/bash
            - -c
            - |
              /opt/keycloak/bin/kc.sh start --http-enabled=true --proxy-headers xforwarded &
              KC_PID=$!
              trap 'kill -TERM "$KC_PID" 2>/dev/null' TERM INT
              /bin/bash /scripts/apply-mfa-config.sh &
              wait "$KC_PID"
          args: []
          resources:
            requests:
              cpu: 500m
          env:
            - name: KC_HOSTNAME
              value: https://keycloak-customer-tb-dev.tail2726a2.ts.net
            - name: KC_DB_URL_HOST
              valueFrom: null
              value: ep-fragrant-block-a2bv6iw5.eu-central-1.aws.neon.tech
            - name: KC_DB_URL_PORT
              valueFrom: null
              value: "5432"
            - name: KC_DB_URL_PROPERTIES
              value: "?sslmode=require"
