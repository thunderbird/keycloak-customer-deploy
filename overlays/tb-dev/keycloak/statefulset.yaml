# tb-dev patch:
# - PUBLIC auth hostname (auth.tb-dev.thunderbird.dev, served by the internet-facing
#   ALB Ingress keycloak/public-ingress.yaml on the thunderbird.dev TEST domain);
#   KC_HOSTNAME_ADMIN keeps the admin console/REST URLs on the tailnet Ingress. Admin
#   is denied at the public ALB edge (403) -- see keycloak/public-ingress.yaml.
# - 2 replicas, 500m cpu request so both pods fit the 2-node general pool
# - DB repointed from the throwaway dev RDS to the Neon branch "mzla-tb-dev"
#   (copy-on-write clone of stage tbpro). DIRECT endpoint (not -pooler) so
#   Liquibase/jdbc-ping aren't on PgBouncer; sslmode=require (Neon needs TLS).
#   valueFrom: null drops the base ConfigMap ref, so the ACK RDS/FieldExport
#   chain is moot (the RDS is left idle for now). Creds come from the
#   keycloak-customer-db ExternalSecret (now holding the branch keycloak_owner creds).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-customer
  namespace: keycloak-customer
spec:
  # Clustered (base replicas: 2, Infinispan DNS_PING).
  template:
    spec:
      containers:
        - name: keycloak
          # THE actual dev login fix: --proxy-headers xforwarded.
          #
          # The image entrypoint (scripts/entry-keycloak.sh) hardcodes
          # `kc.sh start ... --proxy-headers forwarded`, a CLI flag that overrides
          # the base KC_PROXY_HEADERS=xforwarded env and makes Keycloak read the
          # RFC 7239 `Forwarded` header. The Tailscale ingress sends only
          # X-Forwarded-* headers, so Keycloak never sees the forwarded https
          # scheme -> non-secure context -> the AUTH_SESSION_ID cookie is set
          # SameSite=None without Secure -> the browser refuses to store it ->
          # the login POST has no auth-session cookie -> 400 "Cookie not found"
          # (surfaced as cookie_not_found / invalid_code). Running with
          # `xforwarded` makes Keycloak read X-Forwarded-Proto=https -> secure
          # context -> Secure cookie -> stored & sent -> login completes.
          #
          # (The `&amp;` HTML-escaping of loginAction in the tbpro theme was a red
          # herring: Keycloak recovers `execution` from the cookie, so it is
          # harmless -- stage renders the identical `&amp;` and logs in fine. The
          # earlier theme-?no_esc initContainer was therefore removed.)
          #
          # TEMPORARY interim override. The durable resolution is the
          # auth.tb.pro cutover ingress/LB design -- front Keycloak with an LB so
          # it sees HTTPS directly (TLS passthrough / HTTPS backend), making the
          # proxy-headers mode moot. Tracked with the cutover: platform-infrastructure#142.
          command:
            - /bin/bash
            - -c
            - |
              /opt/keycloak/bin/kc.sh start --http-enabled=true --proxy-headers xforwarded &
              KC_PID=$!
              trap 'kill -TERM "$KC_PID" 2>/dev/null' TERM INT
              # Both config-cli reconciles issue PUT /realms/tbpro, so run them
              # SEQUENTIALLY (one background subshell) -- launching both with `&`
              # races on the realm update (HTTP 409 "Realm with same name exists" +
              # duplicate-key on REALM_ATTRIBUTE). apply-mfa-config.sh is the image's
              # baked MFA step-up reconcile; apply-client-config.sh (ConfigMap-mounted,
              # not image-baked) reconciles the tbpro thunderbird-accounts client
              # (redirect URIs / web origins / app URLs / is_services_admin mapper) so
              # a Neon branch reset no longer needs a manual kcadm re-add. Both
              # fail-soft, same tb-accounts-admin auth.
              { /bin/bash /scripts/apply-mfa-config.sh; /bin/bash /scripts-extra/apply-client-config.sh; } &
              wait "$KC_PID"
          args: []
          resources:
            requests:
              cpu: 500m
          env:
            # PUBLIC auth host, served by the internet-facing ALB Ingress.
            - name: KC_HOSTNAME
              value: https://auth.tb-dev.thunderbird.dev
            # Admin console/REST URLs -> tailnet Ingress (keycloak/tailscale-ingress.yaml).
            # URL generation only; the public ALB edge 403 is the actual admin gate.
            - name: KC_HOSTNAME_ADMIN
              value: https://keycloak-customer-tb-dev.tail2726a2.ts.net
            - name: KC_DB_URL_HOST
              valueFrom: null
              value: ep-fragrant-block-a2bv6iw5.eu-central-1.aws.neon.tech
            - name: KC_DB_URL_PORT
              valueFrom: null
              value: "5432"
            - name: KC_DB_URL_PROPERTIES
              value: "?sslmode=require"
            # keycloak-config-cli auth (client_credentials as the master-realm
            # tb-accounts-admin SA). Un-skips the image's apply-mfa-config.sh AND
            # drives apply-client-config.sh. Secret is the cloned stage value, so it
            # keeps matching after a Neon branch reset.
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: tb-accounts-admin
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-customer-admin-client
                  key: client-secret
          volumeMounts:
            # config-cli import file + apply script, delivered via ConfigMap
            # (configMapGenerator in the overlay kustomization).
            - name: realm-config
              mountPath: /config
              readOnly: true
            - name: realm-config-scripts
              mountPath: /scripts-extra
              readOnly: true
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config
        - name: realm-config-scripts
          configMap:
            name: keycloak-realm-config-scripts
