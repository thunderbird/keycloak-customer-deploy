# Tailnet Ingress for the tb-dev Customer Auth Keycloak. Now that the customer auth
# host is public (keycloak/public-ingress.yaml -> auth.tb-dev.thunderbird.dev), this
# tailnet host is the ADMIN path: KC_HOSTNAME_ADMIN points admin console/REST URLs here,
# and the public ALB denies /admin + /realms/master (403), so admin is never publicly
# exposed. It still serves the whole service over the tailnet for admin/ops.
#
# Deliberately absent annotations:
#   - tailscale.com/funnel: would expose the service publicly.
#   - tailscale.com/tags: operator default (tag:k8s-mzla-tb-dev) is correct.
#   - tailscale.com/hostname: tls.hosts[0] is the documented hostname source.
# Operator appends .<TAILNET>.ts.net -> keycloak-customer-tb-dev.tail2726a2.ts.net
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak-customer-tb-dev
  namespace: keycloak-customer
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - keycloak-customer-tb-dev
  defaultBackend:
    service:
      name: keycloak-customer
      port:
        number: 80
