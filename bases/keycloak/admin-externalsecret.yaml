# Syncs Customer Auth Keycloak bootstrap admin credentials from Secrets Manager.
# remoteRef.key is patched per overlay (mzla/tb-dev/* or mzla/tb-prod/*).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-customer-admin
  namespace: keycloak-customer
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: keycloak-customer-admin
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: mzla/OVERLAY-MUST-PATCH/keycloak-customer-admin
        property: username
    - secretKey: password
      remoteRef:
        key: mzla/OVERLAY-MUST-PATCH/keycloak-customer-admin
        property: password
