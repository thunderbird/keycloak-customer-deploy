# Syncs Customer Auth RDS credentials from AWS Secrets Manager.
# remoteRef.key is patched per overlay to the env path
# (mzla/tb-dev/* or mzla/tb-prod/*). Create the secret first, e.g.:
#   aws secretsmanager create-secret --name mzla/tb-dev/keycloak-customer-db \
#     --secret-string '{"username":"keycloak","password":"GENERATE"}' --region eu-central-1
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-customer-db
  namespace: keycloak-customer
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: keycloak-customer-db
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: mzla/OVERLAY-MUST-PATCH/keycloak-customer-db
        property: username
    - secretKey: password
      remoteRef:
        key: mzla/OVERLAY-MUST-PATCH/keycloak-customer-db
        property: password
